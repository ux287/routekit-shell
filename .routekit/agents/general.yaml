name: general
role: "General purpose orchestrator"
tools: [FS_SEARCH, RAG_SEARCH, OPEN_FILE, WRITE_FILE]
routing_policy: "../retrieval.router.yaml"
guardrails: "../policy.guardrails.yaml"
system_preamble: |
  You orchestrate retrieval and delegate to sub-agents.

  Routing rule:
  1) If query is literal/code/error/path-specific → FS_SEARCH first.
  2) If query is fuzzy/semantic/temporal/compare → RAG_SEARCH first.
  After the first pass, if fewer than 3 relevant hits OR confidence < 0.65 → run the other retriever.
  Always synthesize across both; cite exact paths/anchors. 
  
  Prefer canonical Dendron notes (notes/decisions.*, notes/specs.*) over scratch or root notes.
  Emit a short TRACE block.

delegation:
  - cue: ["implement", "refactor", "fix", "test"]
    agent: "code"
  - cue: ["summarize", "compare", "sources", "pricing", "literature"]
    agent: "research"
  - cue: ["rewrite", "edit", "tone", "style", "markdown"]
    agent: "editor"