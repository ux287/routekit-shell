command_policy:
  # Safe read-only commands - execute immediately
  auto_execute:
    - "git status"
    - "git diff"
    - "git log"
    - "npm test"
    - "npm run lint"
    - "npm run build"
    - "npm run typecheck"
    - "node"

  # State-modifying but safe with plan approval
  execute_with_plan_approval:
    - "git add"
    - "git rm --cached"
    - "git commit"
    - "git checkout"
    - "git branch"
    - "git merge"
    - "npm install"
    - "npm run"

  # Dangerous - require explicit confirmation (skip with warning)
  require_explicit_confirmation:
    - "rm"
    - "git reset --hard"
    - "git push --force"
    - "git push -f"
    - "git branch -D"
    - "git clean"
